<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>量子财富智能交易平台 - 实时行情</title>
    
    <!-- 暗黑主题系统 -->
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/mobile-touch.css">
    
    <style>
        /* ========== 页面布局 ========== */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* ========== 玻璃态导航栏 ========== */
        .navbar {
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
        }

        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #7b61ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition-fast);
            user-select: none;
        }

        .navbar-brand:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .navbar-brand .beta-tag {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--primary-dim);
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .navbar-center {
            display: flex;
            gap: 32px;
            align-items: center;
            flex: 1;
            margin: 0 40px;
        }

        .nav-link {
            color: var(--text-sec);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            border-bottom: 2px solid transparent;
            transition: var(--transition-fast);
            cursor: pointer;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        /* 搜索框 */
        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: var(--transition-fast);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-dim);
        }

        .search-box input::placeholder {
            color: var(--text-sec);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sec);
            font-size: 16px;
            pointer-events: none;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-btn,
        .settings-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-sec);
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .theme-btn:hover,
        .settings-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: var(--primary-dim);
        }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
        }

        /* ========== 主内容区域 ========== */
        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 32px 60px;
            min-height: calc(100vh - 60px);
        }

        /* ========== 频道系统 ========== */
        .channel {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .channel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 频道头部 ========== */
        .channel-header {
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .channel-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-title .icon {
            font-size: 36px;
        }

        .channel-subtitle {
            font-size: 16px;
            color: var(--text-sec);
        }

        /* ========== 加载状态 ========== */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text-sec);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== 响应式：移动端 ========== */
        @media (max-width: 768px) {
            .navbar {
                padding: 10px 16px;
            }

            .navbar-brand {
                font-size: 18px;
            }

            .navbar-center {
                display: none;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(10, 14, 23, 0.98);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 24px;
                margin: 0;
                gap: 0;
                z-index: 999;
            }

            .navbar-center.show {
                display: flex;
            }

            .nav-link {
                width: 100%;
                padding: 16px 20px;
                border-bottom: none;
                border-left: 3px solid transparent;
                border-radius: var(--radius-sm);
            }

            .nav-link.active {
                border-left-color: var(--primary);
                background: var(--primary-dim);
            }

            .search-box {
                width: 100%;
                max-width: none;
                order: -1;
                margin-bottom: 20px;
            }

            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .navbar-right {
                gap: 8px;
            }

            .main-content {
                padding: 16px 16px 80px;
            }

            .channel-title {
                font-size: 24px;
            }

            .channel-subtitle {
                font-size: 14px;
            }
        }

        /* ========== 底部移动端导航 ========== */
        .mobile-tabbar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
            box-shadow: 0 -2px 16px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .mobile-tabbar {
                display: flex;
            }
        }

        .mobile-tabbar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 0;
            cursor: pointer;
            transition: var(--transition-fast);
            color: var(--text-sec);
            font-size: 11px;
        }

        .mobile-tabbar-item.active {
            color: var(--primary);
        }

        .mobile-tabbar-icon {
            font-size: 22px;
        }

        /* ========== 全屏遮罩（移动端菜单背景） ========== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
            backdrop-filter: blur(4px);
        }

        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 全屏遮罩 -->
    <div class="overlay" id="overlay"></div>

    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand" data-channel="home">
            QuantViz <span class="beta-tag">BETA</span>
        </div>
        
        <div class="navbar-center" id="navbarMenu">
            <!-- 搜索框 -->
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="搜索股票代码或名称..." id="searchInput">
            </div>
            
            <a class="nav-link active" data-channel="home">首页</a>
            <a class="nav-link" data-channel="indices">全球指数</a>
            <a class="nav-link" data-channel="sectors">板块资金流</a>
            <a class="nav-link" data-channel="recommendations">AI 推荐</a>
        </div>
        
        <div class="navbar-right">
            <button class="theme-btn" title="主题切换">🌙</button>
            <button class="settings-btn" title="设置">⚙️</button>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 首页频道 -->
        <div id="channel-home" class="channel active">
            <div class="channel-header">
                <h1 class="channel-title">
                    <span class="icon">📊</span>
                    实时仪表盘
                </h1>
                <p class="channel-subtitle">全市场核心数据一览</p>
            </div>
            <div id="home-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载数据...</p>
                </div>
            </div>
        </div>

        <!-- 全球指数频道 -->
        <div id="channel-indices" class="channel">
            <div class="channel-header">
                <h1 class="channel-title">
                    <span class="icon">🌍</span>
                    全球指数
                </h1>
                <p class="channel-subtitle">实时追踪全球主要指数行情</p>
            </div>
            <div id="indices-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载指数数据...</p>
                </div>
            </div>
        </div>

        <!-- 板块资金流频道 -->
        <div id="channel-sectors" class="channel">
            <div class="channel-header">
                <h1 class="channel-title">
                    <span class="icon">📈</span>
                    板块资金流向
                </h1>
                <p class="channel-subtitle">实时监控行业板块资金动向</p>
            </div>
            <div id="sectors-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载板块数据...</p>
                </div>
            </div>
        </div>

        <!-- AI 推荐频道 -->
        <div id="channel-recommendations" class="channel">
            <div class="channel-header">
                <h1 class="channel-title">
                    <span class="icon">🤖</span>
                    AI 精选推荐
                </h1>
                <p class="channel-subtitle">AI 算法筛选优质投资标的</p>
            </div>
            <div id="recommendations-content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在加载推荐数据...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部移动端导航栏 -->
    <div class="mobile-tabbar">
        <div class="mobile-tabbar-item active" data-channel="home">
            <span class="mobile-tabbar-icon">📊</span>
            <span>首页</span>
        </div>
        <div class="mobile-tabbar-item" data-channel="indices">
            <span class="mobile-tabbar-icon">🌍</span>
            <span>指数</span>
        </div>
        <div class="mobile-tabbar-item" data-channel="sectors">
            <span class="mobile-tabbar-icon">📈</span>
            <span>板块</span>
        </div>
        <div class="mobile-tabbar-item" data-channel="recommendations">
            <span class="mobile-tabbar-icon">🤖</span>
            <span>推荐</span>
        </div>
    </div>

    <!-- 主应用逻辑 -->
    <script>
        // ========== 当前激活的频道 ==========
        let currentChannel = 'home';
        
        // ========== 频道切换函数 ==========
        function switchChannel(channelName) {
            // 隐藏所有频道
            document.querySelectorAll('.channel').forEach(ch => {
                ch.classList.remove('active');
            });
            
            // 更新桌面导航激活状态
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('data-channel') === channelName) {
                    link.classList.add('active');
                }
            });
            
            // 更新移动端导航激活状态
            document.querySelectorAll('.mobile-tabbar-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-channel') === channelName) {
                    item.classList.add('active');
                }
            });
            
            // 显示目标频道
            const targetChannel = document.getElementById(`channel-${channelName}`);
            if (targetChannel) {
                targetChannel.classList.add('active');
                currentChannel = channelName;
                
                // 加载频道内容
                loadChannelContent(channelName);
            }
            
            // 关闭移动端菜单
            closeMenu();
            
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // 暴露频道切换函数供外部调用
        window.switchChannel = switchChannel;
        
        // ========== 加载频道内容 ==========
        async function loadChannelContent(channelName) {
            const contentDiv = document.getElementById(`${channelName}-content`);
            if (!contentDiv) return;
            
            // 检查是否已加载
            if (contentDiv.getAttribute('data-loaded') === 'true') {
                return;
            }
            
            try {
                switch(channelName) {
                    case 'home':
                        await loadHomeContent();
                        break;
                    case 'indices':
                        await loadIndicesContent();
                        break;
                    case 'sectors':
                        await loadSectorsContent();
                        break;
                    case 'recommendations':
                        await loadRecommendationsContent();
                        break;
                }
                
                contentDiv.setAttribute('data-loaded', 'true');
            } catch (error) {
                console.error(`加载${channelName}频道失败:`, error);
                contentDiv.innerHTML = `
                    <div class="loading">
                        <span style="font-size: 48px;">❌</span>
                        <p>加载失败，请稍后重试</p>
                    </div>
                `;
            }
        }
        
        // ========== 加载首页内容 ==========
        async function loadHomeContent() {
            const container = document.getElementById('home-content');
            
            // TODO: 这里应该加载实际的首页内容
            // 暂时显示占位符
            container.innerHTML = `
                <div class="glass-card" style="padding: 40px; text-align: center;">
                    <h2>首页内容开发中...</h2>
                    <p>将包含：关键指数卡片 + 推荐股票列表 + 市场热点</p>
                </div>
            `;
        }
        
        // ========== 加载全球指数内容 ==========
        async function loadIndicesContent() {
            const container = document.getElementById('indices-content');
            
            // TODO: 实际项目中应该从 API 加载数据
            container.innerHTML = `
                <div class="glass-card" style="padding: 40px; text-align: center;">
                    <h2>全球指数页面开发中...</h2>
                    <p>将显示：上证指数、深证成指、恒生指数、标普500等</p>
                </div>
            `;
        }
        
        // ========== 加载板块资金流内容 ==========
        async function loadSectorsContent() {
            const container = document.getElementById('sectors-content');
            
            container.innerHTML = `
                <div class="glass-card" style="padding: 40px; text-align: center;">
                    <h2>板块资金流页面开发中...</h2>
                    <p>将显示：各板块资金流向、涨跌幅排行</p>
                </div>
            `;
        }
        
        // ========== 加载 AI 推荐内容 ==========
        async function loadRecommendationsContent() {
            const container = document.getElementById('recommendations-content');
            
            container.innerHTML = `
                <div class="glass-card" style="padding: 40px; text-align: center;">
                    <h2>AI 推荐页面开发中...</h2>
                    <p>将显示：AI 算法筛选的优质股票</p>
                </div>
            `;
        }
        
        // ========== 移动端菜单控制 ==========
        const menuBtn = document.getElementById('mobileMenuBtn');
        const navMenu = document.getElementById('navbarMenu');
        const overlay = document.getElementById('overlay');
        
        function openMenu() {
            navMenu.classList.add('show');
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeMenu() {
            navMenu.classList.remove('show');
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }
        
        menuBtn.addEventListener('click', () => {
            if (navMenu.classList.contains('show')) {
                closeMenu();
            } else {
                openMenu();
            }
        });
        
        overlay.addEventListener('click', closeMenu);
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定桌面导航点击事件
            document.querySelectorAll('.nav-link, .navbar-brand').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const channelName = link.getAttribute('data-channel');
                    if (channelName) {
                        switchChannel(channelName);
                    }
                });
            });
            
            // 绑定移动端导航点击事件
            document.querySelectorAll('.mobile-tabbar-item').forEach(item => {
                item.addEventListener('click', () => {
                    const channelName = item.getAttribute('data-channel');
                    if (channelName) {
                        switchChannel(channelName);
                    }
                });
            });
            
            // 主题切换
            document.querySelector('.theme-btn').addEventListener('click', () => {
                // TODO: 实现亮色/暗色主题切换
                alert('主题切换功能开发中...');
            });
            
            // 设置按钮
            document.querySelector('.settings-btn').addEventListener('click', () => {
                // TODO: 打开设置面板
                alert('设置功能开发中...');
            });
            
            // 搜索功能
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value;
                // TODO: 实现搜索功能
                console.log('搜索:', query);
            });
            
            // 加载首页内容
            loadChannelContent('home');
        });
    </script>
</body>
</html>

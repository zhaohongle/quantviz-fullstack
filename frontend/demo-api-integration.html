<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantViz - API 集成示例</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        .demo-section {
            background-color: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .data-card {
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            padding: 16px;
            background-color: #F9FAFB;
        }
        
        .data-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.success {
            background-color: #D1FAE5;
            color: #065F46;
        }
        
        .status-badge.error {
            background-color: #FEE2E2;
            color: #991B1B;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔌 QuantViz API 集成示例</h1>
        <p style="font-size: 14px; opacity: 0.9;">测试后端API连接和数据加载</p>
    </div>

    <div class="container">
        <!-- API 状态 -->
        <div class="demo-section">
            <h2 class="section-title">📡 API 连接状态</h2>
            <div id="api-status">
                <div class="loading">检测中...</div>
            </div>
        </div>

        <!-- 指数数据 -->
        <div class="demo-section">
            <h2 class="section-title">📊 指数数据</h2>
            <div id="indices-data">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 新闻数据 -->
        <div class="demo-section">
            <h2 class="section-title">📰 实时新闻</h2>
            <div id="news-data">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 板块数据 -->
        <div class="demo-section">
            <h2 class="section-title">💼 板块数据</h2>
            <div id="sectors-data">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="demo-section">
            <h2 class="section-title">🎮 控制面板</h2>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-primary" onclick="refreshAll()">🔄 刷新所有数据</button>
                <button class="btn btn-outline" onclick="testOfflineMode()">⚠️ 测试离线模式</button>
                <button class="btn btn-secondary" onclick="location.href='prd1/indices.html'">➡️ 进入正式页面</button>
            </div>
        </div>
    </div>

    <script src="../js/api-integration.js"></script>
    <script>
        let isOfflineMode = false;

        // 检查 API 健康状态
        async function checkApiHealth() {
            try {
                const response = await fetch('http://localhost:3000/api/health');
                const data = await response.json();
                
                document.getElementById('api-status').innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="status-badge success">✅ 连接正常</span>
                        <span class="text-muted text-small">最后更新: ${data.lastUpdate ? new Date(data.lastUpdate).toLocaleString('zh-CN') : '未知'}</span>
                        <span class="text-muted text-small">运行时间: ${Math.floor(data.uptime)}秒</span>
                    </div>
                `;
                return true;
            } catch (error) {
                document.getElementById('api-status').innerHTML = `
                    <div>
                        <span class="status-badge error">❌ 连接失败</span>
                        <p class="text-muted text-small" style="margin-top: 8px;">错误: ${error.message}</p>
                        <p class="text-muted text-small">请确保后端服务已启动: <code>cd backend && npm start</code></p>
                    </div>
                `;
                return false;
            }
        }

        // 渲染指数数据
        async function loadIndices() {
            try {
                const indices = isOfflineMode ? mockData.indices : await fetchIndices();
                
                const html = `
                    <div class="data-grid">
                        ${indices.map(idx => `
                            <div class="data-card">
                                <h3>${idx.name} <span class="text-muted text-small">${idx.code}</span></h3>
                                <div class="price">${formatPrice(idx.price)}</div>
                                <div class="change ${idx.change > 0 ? 'up' : 'down'}">
                                    ${formatChange(idx.changePercent).text} ${formatChange(idx.changePercent).arrow}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('indices-data').innerHTML = html;
            } catch (error) {
                document.getElementById('indices-data').innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        // 渲染新闻数据
        async function loadNews() {
            try {
                const news = isOfflineMode ? mockData.news : await fetchNews();
                
                const html = `
                    <div class="data-grid">
                        ${news.map(item => `
                            <div class="data-card">
                                <div class="text-muted text-small">${item.time} · ${item.source}</div>
                                <h3 style="margin-top: 8px;">${item.title}</h3>
                                <p class="text-muted text-small" style="margin-top: 8px;">${item.summary}</p>
                                <div style="margin-top: 8px;">
                                    ${(item.tags || []).map(tag => `<span class="tag">#${tag}</span>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('news-data').innerHTML = html;
            } catch (error) {
                document.getElementById('news-data').innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        // 渲染板块数据
        async function loadSectors() {
            try {
                const sectors = isOfflineMode ? [] : await fetchSectors();
                
                if (sectors.length === 0) {
                    document.getElementById('sectors-data').innerHTML = `<div class="text-muted">暂无数据</div>`;
                    return;
                }
                
                const html = `
                    <div class="data-grid">
                        ${sectors.map(sector => `
                            <div class="data-card">
                                <h3>${sector.name}</h3>
                                <div class="change ${sector.change > 0 ? 'up' : 'down'}">
                                    ${formatChange(sector.changePercent).text}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                document.getElementById('sectors-data').innerHTML = html;
            } catch (error) {
                document.getElementById('sectors-data').innerHTML = `<div class="error">${error.message}</div>`;
            }
        }

        // 刷新所有数据
        async function refreshAll() {
            await checkApiHealth();
            await loadIndices();
            await loadNews();
            await loadSectors();
        }

        // 测试离线模式
        function testOfflineMode() {
            isOfflineMode = !isOfflineMode;
            alert(isOfflineMode ? '⚠️ 已切换到离线模式（使用 Mock 数据）' : '✅ 已切换到在线模式');
            refreshAll();
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 API集成示例页面加载完成');
            refreshAll();
            
            // 每30秒自动刷新
            setInterval(() => {
                if (!isOfflineMode) {
                    refreshAll();
                }
            }, 30000);
        });
    </script>
</body>
</html>

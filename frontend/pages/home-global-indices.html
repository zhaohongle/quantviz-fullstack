<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球指数 - 量子财富</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link rel="stylesheet" href="../css/design-system.css">
    <style>
        /* Page Layout */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary, #0a0e1a);
            color: var(--text-primary, #e8eaed);
            min-height: 100vh;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(0, 230, 118, 0.05) 100%);
            border-radius: 16px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 12px 0;
            background: linear-gradient(135deg, #00d4ff 0%, #00e676 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            font-size: 16px;
            color: var(--text-secondary, #9aa0a6);
            margin: 0;
        }

        /* 全球指数网格 */
        .indices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 指数卡片 */
        .index-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .index-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .index-market {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .index-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary, #e8eaed);
            margin-bottom: 12px;
        }

        .index-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary, #e8eaed);
            margin: 8px 0;
            font-variant-numeric: tabular-nums;
        }

        .index-change {
            font-size: 18px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .index-change.up {
            color: #00e676;
        }

        .index-change.down {
            color: #ff5252;
        }

        .index-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .index-detail-item {
            font-size: 13px;
            color: var(--text-secondary, #9aa0a6);
        }

        .index-detail-label {
            opacity: 0.7;
        }

        .index-detail-value {
            font-weight: 600;
            color: var(--text-primary, #e8eaed);
            font-variant-numeric: tabular-nums;
        }

        /* 资讯区 */
        .news-section {
            margin-top: 60px;
        }

        .news-section h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 资讯卡片 */
        .news-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .news-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .news-time {
            font-size: 12px;
            color: var(--text-secondary, #9aa0a6);
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .news-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary, #e8eaed);
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .news-summary {
            font-size: 13px;
            color: var(--text-secondary, #9aa0a6);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary, #9aa0a6);
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            padding: 40px;
            color: #ff5252;
        }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .indices-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
            }

            .index-card {
                padding: 16px;
            }

            .index-value {
                font-size: 24px;
            }

            .index-change {
                font-size: 14px;
            }

            .page-header h1 {
                font-size: 28px;
            }
        }

        /* Last Update Time */
        .update-time {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary, #9aa0a6);
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1>🌍 全球指数</h1>
            <p>实时追踪全球主要股票指数</p>
        </div>

        <!-- 全球指数网格 -->
        <div id="indices-grid" class="indices-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>

        <!-- 股市资讯 -->
        <div class="news-section">
            <h2>📰 股市资讯</h2>
            <div id="news-list" class="news-list">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 最后更新时间 -->
        <div id="update-time" class="update-time"></div>
    </div>

    <script src="../js/home-data.js"></script>
</body>
</html>

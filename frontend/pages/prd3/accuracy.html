<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史准确率追踪 - 量子财富智能交易平台</title>
    <link rel="stylesheet" href="../../css/dark-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Sans CN', 'Roboto', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background-color: #1E3A8A;
            color: #FFFFFF;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #FFFFFF;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: var(--text-sec);
        }

        /* 总体准确率卡片 */
        .overall-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .accuracy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .accuracy-card {
            background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%);
            border-radius: 8px;
            padding: 20px;
            color: #FFFFFF;
        }

        .accuracy-period {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .accuracy-value {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .accuracy-detail {
            font-size: 14px;
            opacity: 0.8;
        }

        .stats-row {
            display: flex;
            gap: 24px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
        }

        .stat-item {
            flex: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: #1E3A8A;
        }

        /* 分类准确率 */
        .category-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .category-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .category-item {
            padding: 16px;
            background: var(--bg);
            border-radius: 8px;
            border-left: 4px solid #1E3A8A;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .category-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .category-accuracy {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: #1E3A8A;
        }

        .category-count {
            font-size: 14px;
            color: var(--text-sec);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #E5E7EB;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1E3A8A 0%, #3B82F6 100%);
            transition: width 0.3s ease;
        }

        /* 图表容器 */
        .chart-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        #trendChart {
            width: 100%;
            height: 300px;
        }

        /* 说明文字 */
        .disclaimer {
            background-color: #FFFBEB;
            border: 1px solid #FCD34D;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .disclaimer-title {
            font-size: 14px;
            font-weight: 600;
            color: #92400E;
            margin-bottom: 8px;
        }

        .disclaimer-text {
            font-size: 13px;
            color: #78350F;
            line-height: 1.6;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                padding: 16px;
            }

            .accuracy-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                flex-direction: column;
                gap: 16px;
            }

            .category-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <h1>📊 历史准确率追踪</h1>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            加载中...
        </div>

        <div id="content" style="display: none;">
            <!-- 总体准确率 -->
            <div class="overall-section">
                <h2 class="section-title">📈 总体准确率</h2>
                <div class="accuracy-grid">
                    <div class="accuracy-card">
                        <div class="accuracy-period">近 30 天</div>
                        <div class="accuracy-value" id="accuracy30d"></div>
                        <div class="accuracy-detail" id="detail30d"></div>
                    </div>
                    <div class="accuracy-card">
                        <div class="accuracy-period">近 60 天</div>
                        <div class="accuracy-value" id="accuracy60d"></div>
                        <div class="accuracy-detail" id="detail60d"></div>
                    </div>
                    <div class="accuracy-card">
                        <div class="accuracy-period">近 90 天</div>
                        <div class="accuracy-value" id="accuracy90d"></div>
                        <div class="accuracy-detail" id="detail90d"></div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-label">总推荐数（30天）</div>
                        <div class="stat-value" id="totalRecs"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">盈利推荐</div>
                        <div class="stat-value" id="profitableRecs"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">平均收益率</div>
                        <div class="stat-value" style="color: #10B981;" id="avgReturn"></div>
                    </div>
                </div>
            </div>

            <!-- 分类准确率 -->
            <div class="category-section">
                <h2 class="section-title">🎯 分类准确率</h2>
                <div class="category-list" id="categoryList"></div>
            </div>

            <!-- 趋势图表 -->
            <div class="chart-section">
                <h2 class="section-title">📉 近 7 天准确率趋势</h2>
                <div id="trendChart"></div>
            </div>

            <!-- 说明 -->
            <div class="disclaimer">
                <div class="disclaimer-title">📋 数据说明</div>
                <div class="disclaimer-text">
                    • 准确率定义：推荐股票在 T+5 日内达到目标价或收益率 > 5% 视为成功<br>
                    • 数据更新：每日交易结束后更新（15:30）<br>
                    • 统计范围：仅统计"推荐买入"及以上级别的推荐<br>
                    • 风险提示：历史业绩不代表未来收益，投资需谨慎
                </div>
            </div>
        </div>
    </div>

    <script>
        loadAccuracyData();

        async function loadAccuracyData() {
            try {
                const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:3000'
                    : 'https://quantviz-fullstack-nkxq.vercel.app';

                const response = await fetch(`${API_BASE}/api/recommendations/accuracy`);
                
                if (!response.ok) {
                    throw new Error('获取准确率数据失败');
                }

                const result = await response.json();
                const data = result.data;

                // 填充总体准确率
                document.getElementById('accuracy30d').textContent = `${data.overall.accuracy30d.toFixed(1)}%`;
                document.getElementById('detail30d').textContent = `${data.overall.profitable30d}/${data.overall.totalRecommendations30d} 命中`;

                document.getElementById('accuracy60d').textContent = `${data.overall.accuracy60d.toFixed(1)}%`;
                document.getElementById('detail60d').textContent = `${data.overall.profitable60d}/${data.overall.totalRecommendations60d} 命中`;

                document.getElementById('accuracy90d').textContent = `${data.overall.accuracy90d.toFixed(1)}%`;
                document.getElementById('detail90d').textContent = `${data.overall.profitable90d}/${data.overall.totalRecommendations90d} 命中`;

                // 填充统计数据
                document.getElementById('totalRecs').textContent = data.overall.totalRecommendations30d;
                document.getElementById('profitableRecs').textContent = data.overall.profitable30d;
                document.getElementById('avgReturn').textContent = `+${data.overall.avgReturn}%`;

                // 填充分类准确率
                const categoryList = document.getElementById('categoryList');
                categoryList.innerHTML = Object.entries(data.byCategory).map(([name, stats]) => {
                    const accuracy = parseFloat(stats.accuracy);
                    return `
                        <div class="category-item">
                            <div class="category-header">
                                <span class="category-name">${name}</span>
                                <span class="category-accuracy">${accuracy.toFixed(1)}%</span>
                            </div>
                            <div class="category-count">样本数: ${stats.count} 个</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${accuracy}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');

                // 绘制趋势图
                renderTrendChart(data.recentPerformance);

                // 显示内容
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').innerHTML = '❌ 加载失败，请稍后重试';
            }
        }

        function renderTrendChart(recentData) {
            const chart = echarts.init(document.getElementById('trendChart'));
            
            const dates = recentData.map(d => d.date.slice(5)); // 只保留 MM-DD
            const accuracies = recentData.map(d => parseFloat(d.accuracy));
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        return `${params[0].axisValue}<br/>准确率: ${params[0].value}%`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLabel: {
                        color: '#6B7280'
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#E5E7EB'
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '准确率 (%)',
                    min: 0,
                    max: 100,
                    axisLabel: {
                        color: '#6B7280',
                        formatter: '{value}%'
                    },
                    axisLine: {
                        lineStyle: {
                            color: '#E5E7EB'
                        }
                    },
                    splitLine: {
                        lineStyle: {
                            color: '#E5E7EB'
                        }
                    }
                },
                series: [
                    {
                        data: accuracies,
                        type: 'line',
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: {
                            color: '#1E3A8A',
                            width: 3
                        },
                        itemStyle: {
                            color: '#1E3A8A'
                        },
                        areaStyle: {
                            color: {
                                type: 'linear',
                                x: 0,
                                y: 0,
                                x2: 0,
                                y2: 1,
                                colorStops: [{
                                    offset: 0,
                                    color: 'rgba(30, 58, 138, 0.3)'
                                }, {
                                    offset: 1,
                                    color: 'rgba(30, 58, 138, 0.05)'
                                }]
                            }
                        }
                    }
                ]
            };
            
            chart.setOption(option);
            
            // 响应式
            window.addEventListener('resize', () => {
                chart.resize();
            });
        }
    </script>
</body>
</html>

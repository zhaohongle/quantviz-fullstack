<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐详情 - 量子财富智能交易平台</title>
    <link rel="stylesheet" href="../../css/dark-theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Han Sans CN', 'Roboto', -apple-system, sans-serif;
            background: var(--bg) !important;
            color: var(--text) !important;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.3), rgba(59, 130, 246, 0.2));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            color: var(--text);
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: var(--text-sec);
        }

        /* 股票概览卡片 */
        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .stock-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stock-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }

        .stock-code {
            font-size: 18px;
            color: var(--text-sec);
        }

        .rating-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .price-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .price-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .price-label {
            font-size: 14px;
            color: var(--text-sec);
        }

        .price-value {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .price-change {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 18px;
            font-weight: 700;
        }

        .price-change.up { color: var(--up); }
        .price-change.down { color: var(--down); }

        .score-section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #FFFFFF;
        }

        .confidence-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            background-color: #10B981;
            color: #FFFFFF;
        }

        /* 推荐理由区域 */
        .reasons-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reason-card {
            border-left: 4px solid;
            padding: 16px;
            margin-bottom: 16px;
            background: var(--bg-hover);
            border-radius: 4px;
        }

        .reason-card.fundamental { border-color: var(--primary); }
        .reason-card.technical { border-color: #F59E0B; }
        .reason-card.sentiment { border-color: var(--up); }

        .reason-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .reason-category {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .category-fundamental { background-color: #1E3A8A; }
        .category-technical { background-color: #F59E0B; }
        .category-sentiment { background-color: #EF4444; }

        .reason-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .confidence-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: auto;
        }

        .confidence-high { background-color: #D1FAE5; color: #065F46; }
        .confidence-medium { background-color: #FEF3C7; color: #92400E; }
        .confidence-low { background-color: #E5E7EB; color: #374151; }

        .reason-detail {
            font-size: 14px;
            color: var(--text-sec);
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .reason-source {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* 风险提示区域 */
        .risks-section {
            background: var(--bg-card);
            border: 2px solid #F59E0B;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .risk-card {
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 4px;
            border-left: 4px solid;
        }

        .risk-card.level-high { border-color: var(--down); background: rgba(255, 82, 82, 0.08); }
        .risk-card.level-medium { border-color: #F59E0B; background: rgba(245, 158, 11, 0.08); }
        .risk-card.level-low { border-color: var(--up); background: rgba(0, 230, 118, 0.08); }

        .risk-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .risk-level {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .level-high { background-color: #EF4444; color: #FFFFFF; }
        .level-medium { background-color: #F59E0B; color: #FFFFFF; }
        .level-low { background-color: #10B981; color: #FFFFFF; }

        .risk-type {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        .risk-description {
            font-size: 14px;
            color: var(--text-sec);
            margin-bottom: 8px;
        }

        .risk-mitigation {
            font-size: 13px;
            color: var(--text-dim);
            padding-left: 16px;
            border-left: 2px solid var(--border);
        }

        .stop-loss-box {
            background: rgba(255, 82, 82, 0.08);
            border: 2px solid var(--down);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }

        .stop-loss-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--down);
            margin-bottom: 8px;
        }

        .stop-loss-price {
            font-family: 'DIN', 'Roboto Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--down);
            margin-bottom: 4px;
        }

        .stop-loss-reason {
            font-size: 14px;
            color: var(--text-sec);
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: var(--text);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary-dim);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                padding: 16px;
            }

            .stock-name {
                font-size: 22px;
            }

            .price-section {
                grid-template-columns: 1fr 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <h1>推荐详情</h1>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            加载中...
        </div>

        <div id="content" style="display: none;">
            <!-- 股票概览 -->
            <div class="overview-card">
                <div class="stock-title">
                    <span class="stock-name" id="stockName"></span>
                    <span class="stock-code" id="stockCode"></span>
                    <span class="rating-badge" id="ratingBadge"></span>
                </div>

                <div class="price-section">
                    <div class="price-item">
                        <span class="price-label">当前价</span>
                        <span class="price-value" id="currentPrice"></span>
                    </div>
                    <div class="price-item">
                        <span class="price-label">今日涨跌</span>
                        <span class="price-change" id="priceChange"></span>
                    </div>
                    <div class="price-item">
                        <span class="price-label">目标价</span>
                        <span class="price-value" style="color: #EF4444;" id="targetPrice"></span>
                    </div>
                    <div class="price-item">
                        <span class="price-label">所属板块</span>
                        <span class="price-value" style="font-size: 16px;" id="sector"></span>
                    </div>
                </div>

                <div class="score-section">
                    <div class="score-circle" id="scoreCircle"></div>
                    <div>
                        <div style="font-size: 16px; font-weight: 600; margin-bottom: 4px;">综合评分</div>
                        <div style="font-size: 14px; color: #6B7280;">基于多维度分析模型</div>
                    </div>
                    <span class="confidence-badge" id="confidenceBadge"></span>
                </div>
            </div>

            <!-- 推荐理由 -->
            <div class="reasons-section">
                <h2 class="section-title">💡 推荐理由（<span id="reasonCount"></span> 条）</h2>
                <div id="reasonsList"></div>
            </div>

            <!-- 风险提示 -->
            <div class="risks-section">
                <h2 class="section-title">⚠️ 风险提示</h2>
                <div id="risksList"></div>
                
                <div class="stop-loss-box">
                    <div class="stop-loss-title">🛑 建议止损价</div>
                    <div class="stop-loss-price" id="stopLossPrice"></div>
                    <div class="stop-loss-reason" id="stopLossReason"></div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn btn-primary">加入自选</button>
                <button class="btn btn-secondary">分享推荐</button>
            </div>
        </div>
    </div>

    <script>
        // 从 URL 获取股票代码
        const urlParams = new URLSearchParams(window.location.search);
        const stockCode = urlParams.get('code');

        if (!stockCode) {
            document.getElementById('loading').innerHTML = '❌ 缺少股票代码参数';
        } else {
            loadRecommendationDetail(stockCode);
        }

        async function loadRecommendationDetail(code) {
            try {
                const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                    ? 'http://localhost:3000'
                    : 'https://quantviz-fullstack-nkxq.vercel.app';

                const response = await fetch(`${API_BASE}/api/recommendations/detailed/${code}`);
                
                if (!response.ok) {
                    throw new Error('获取推荐详情失败');
                }

                const result = await response.json();
                const data = result.data;

                // 填充基本信息
                document.getElementById('stockName').textContent = data.name;
                document.getElementById('stockCode').textContent = `(${data.code})`;
                
                const ratingBadge = document.getElementById('ratingBadge');
                ratingBadge.textContent = data.rating;
                ratingBadge.style.backgroundColor = data.ratingColor;

                document.getElementById('currentPrice').textContent = `¥${data.currentPrice.toFixed(2)}`;
                
                const priceChange = document.getElementById('priceChange');
                const changeText = data.changePercent > 0 ? `+${data.changePercent.toFixed(2)}%` : `${data.changePercent.toFixed(2)}%`;
                priceChange.textContent = changeText;
                priceChange.className = `price-change ${data.changePercent > 0 ? 'up' : 'down'}`;

                document.getElementById('targetPrice').textContent = `¥${data.targetPrice.toFixed(2)}`;
                document.getElementById('sector').textContent = data.sector;

                // 评分圈
                const scoreCircle = document.getElementById('scoreCircle');
                scoreCircle.textContent = data.score;
                scoreCircle.style.backgroundColor = getScoreColor(data.score);

                // 置信度
                document.getElementById('confidenceBadge').textContent = `${data.confidence}置信度`;

                // 推荐理由
                document.getElementById('reasonCount').textContent = data.reasons.length;
                const reasonsList = document.getElementById('reasonsList');
                reasonsList.innerHTML = data.reasons.map(reason => {
                    const categoryClass = getCategoryClass(reason.category);
                    const confidenceClass = getConfidenceClass(reason.confidence);
                    return `
                        <div class="reason-card ${categoryClass}">
                            <div class="reason-header">
                                <span class="reason-category category-${categoryClass}">${getCategoryIcon(reason.category)} ${reason.category}</span>
                                <span class="reason-title">${reason.title}</span>
                                <span class="confidence-tag ${confidenceClass}">${reason.confidence}置信</span>
                            </div>
                            <div class="reason-detail">${reason.detail}</div>
                            <div class="reason-source">数据来源: ${reason.source}</div>
                        </div>
                    `;
                }).join('');

                // 风险提示
                const risksList = document.getElementById('risksList');
                risksList.innerHTML = data.risks.map(risk => {
                    return `
                        <div class="risk-card level-${risk.level === '高' ? 'high' : risk.level === '中' ? 'medium' : 'low'}">
                            <div class="risk-header">
                                <span class="risk-level level-${risk.level === '高' ? 'high' : risk.level === '中' ? 'medium' : 'low'}">${getRiskIcon(risk.level)} ${risk.level}风险</span>
                                <span class="risk-type">${risk.type}</span>
                            </div>
                            <div class="risk-description">${risk.description}</div>
                            <div class="risk-mitigation">💡 应对策略: ${risk.mitigation}</div>
                        </div>
                    `;
                }).join('');

                // 止损价
                document.getElementById('stopLossPrice').textContent = `¥${data.stopLoss.toFixed(2)}`;
                document.getElementById('stopLossReason').textContent = data.stopLossReason;

                // 显示内容
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').innerHTML = '❌ 加载失败，请稍后重试';
            }
        }

        function getScoreColor(score) {
            if (score >= 80) return '#00e676';
            if (score >= 70) return '#00d4ff';
            return '#fdcb6e';
        }

        function getCategoryClass(category) {
            if (category === '基本面') return 'fundamental';
            if (category === '技术面') return 'technical';
            return 'sentiment';
        }

        function getCategoryIcon(category) {
            if (category === '基本面') return '💰';
            if (category === '技术面') return '📈';
            return '🔥';
        }

        function getConfidenceClass(confidence) {
            if (confidence === '高') return 'confidence-high';
            if (confidence === '中') return 'confidence-medium';
            return 'confidence-low';
        }

        function getRiskIcon(level) {
            if (level === '高') return '🔴';
            if (level === '中') return '🟡';
            return '🟢';
        }
    </script>
</body>
</html>
